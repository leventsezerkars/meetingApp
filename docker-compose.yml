services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=TopLanTi2024!Str0ng
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"   # SMTP (uygulama buraya mail gönderir)
      - "8025:8025"  # Web UI (tarayıcıdan mailleri görüntüleme)

  api:
    build: .
    restart: on-failure
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Saat dilimi (API konteyneri): Europe/Istanbul = GMT+3. Degistirmek icin TZ degerini guncelleyin.
      - TZ=Europe/Istanbul
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=ToplantiCaseDb;User Id=sa;Password=TopLanTi2024!Str0ng;TrustServerCertificate=True;
      - Jwt__Key=ToplantiCaseAppSuperSecretKeyForJwtToken2024!
      - Jwt__Issuer=ToplantiApp
      - Jwt__Audience=ToplantiApp
      - Jwt__ExpireHours=24
      - App__FrontendUrl=http://localhost:5000
      - Mail__Host=mailpit
      - Mail__Port=1025
      - Mail__SecureSocketOptions=None
      - Mail__From=noreply@toplanti.app
      - Mail__Username=
      - Mail__Password=
    depends_on:
      mssql:
        condition: service_healthy

volumes:
  mssql_data:
